name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Type-check shared spine
        run: pnpm --filter @id/core --filter @id/ui check-types
      - name: Smoke-test local runner (no key needed)
        run: node local/runner/index.mjs lead-parse "cafe 80m2 budget 150jt Bandung" --dry-run
